<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreams Schools System</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10B981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3413/3413535.png">

    <!-- Styles & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --bg-page: #f8fafc;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Custom Loader --- */
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* --- Transitions --- */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- UI Tweaks --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-press:active {
            transform: scale(0.98);
        }

        /* --- Mobile Optimization --- */
        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            color: #64748b;
            padding: 0.5rem;
        }

        .mobile-nav-item.active {
            color: var(--primary);
            font-weight: bold;
        }

        /* --- Modal Animation --- */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }

        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: all 0.2s;
        }

        .modal-exit {
            opacity: 1;
            transform: scale(1);
        }

        .modal-exit-active {
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.2s;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-right">

    <!-- GLOBAL LOADER -->
    <div id="globalLoader" class="loader-wrapper hidden">
        <div class="spinner"></div>
        <p class="mt-4 text-emerald-600 font-bold animate-pulse">جاري التحميل...</p>
    </div>

    <!-- APP CONTAINER -->
    <div id="app" class="max-w-md mx-auto sm:max-w-full min-h-screen flex flex-col relative overflow-hidden">

        <!-- TOP NAV (Desktop/Admin) -->
        <header id="topNav"
            class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-40 sticky top-0 hidden">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/3413/3413535.png" class="w-8 h-8" alt="Logo">
                <h1 class="font-bold text-lg text-emerald-700">Dreams Schools</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="UI.toggleChangePass()"
                    class="text-gray-500 hover:text-emerald-600 transition p-2 rounded-full hover:bg-emerald-50"
                    title="تغيير كلمة المرور">
                    <i class="fas fa-key"></i>
                </button>
                <button onclick="Auth.logout()"
                    class="text-red-500 hover:text-red-700 transition p-2 rounded-full hover:bg-red-50" title="خروج">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- VIEWS -->
        <main id="mainContent" class="flex-grow p-4 relative z-0">
            <!-- LOGIN VIEW -->
            <section id="view-login"
                class="absolute inset-0 z-50 bg-gradient-to-br from-slate-900 via-emerald-900 to-slate-900 flex flex-col items-center justify-center p-6">

                <div class="w-full max-w-sm relative z-10">
                    <!-- Glass Card -->
                    <div
                        class="bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-white/20 transform transition-all hover:scale-[1.01]">
                        <div class="text-center mb-8">
                            <div
                                class="bg-gradient-to-tr from-emerald-500 to-teal-400 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-emerald-500/30">
                                <i class="fas fa-school text-5xl text-white"></i>
                            </div>
                            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight mb-2">Dreams School</h2>
                            <p class="text-slate-500 font-medium text-sm">نظام الإدارة المدرسية الذكي</p>
                        </div>

                        <form onsubmit="Auth.login(event)">
                            <div class="mb-5 relative group">
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                    <i
                                        class="fas fa-phone text-gray-400 group-focus-within:text-emerald-500 transition"></i>
                                </div>
                                <input type="tel" id="loginPhone" placeholder="رقم الهاتف"
                                    class="w-full pr-12 pl-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition font-bold text-gray-700"
                                    required>
                            </div>
                            <div class="mb-8 relative group">
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                    <i
                                        class="fas fa-lock text-gray-400 group-focus-within:text-emerald-500 transition"></i>
                                </div>
                                <input type="password" id="loginPass" placeholder="كلمة المرور"
                                    class="w-full pr-12 pl-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition font-bold text-gray-700"
                                    required>
                            </div>
                            <button type="submit"
                                class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-500/30 transition transform active:scale-[0.98] flex justify-center items-center gap-2 text-lg">
                                <span>تسجيل الدخول</span>
                                <i class="fas fa-arrow-left text-sm"></i>
                            </button>
                        </form>
                        <p id="loginError"
                            class="text-red-500 text-center mt-6 text-sm hidden bg-red-50 p-3 rounded-xl border border-red-100 font-bold animate-pulse">
                        </p>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-8 text-white/40 text-xs font-sans tracking-wide">
                        <p class="mb-1">© 2026 Dreams School System</p>
                        <p class="flex items-center justify-center gap-1">
                            Designed and Developed by <span class="font-bold text-emerald-400">DreamWare</span>
                        </p>
                    </div>
                </div>
            </section>

            <!-- DASHBOARDS -->
            <section id="view-dashboard" class="hidden fade-in space-y-6 max-w-6xl mx-auto">
                <!-- Welcome Card -->
                <div
                    class="bg-gradient-to-l from-emerald-600 to-teal-500 rounded-2xl p-6 text-white shadow-lg flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold mb-1" id="dashWelcome">أهلاً، حازم</h2>
                        <p class="text-emerald-100 text-sm opacity-90" id="dashRole">مدير النظام</p>
                    </div>
                    <div class="bg-white/20 p-3 rounded-full backdrop-blur-sm">
                        <i class="fas fa-user-circle text-3xl"></i>
                    </div>
                </div>

                <!-- Admin Tabs -->
                <div id="adminTabs"
                    class="hidden flex gap-2 overflow-x-auto pb-2 scrollbar-hide border-b border-gray-200">
                    <button onclick="Admin.switchTab('Stats')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap active-tab"
                        data-tab="Stats"><i class="fas fa-chart-pie mr-2 ml-1"></i>الرئيسية</button>

                    <button onclick="Admin.switchTab('Monitoring')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap"
                        data-tab="Monitoring"><i class="fas fa-eye mr-2 ml-1"></i>المتابعة اليومية</button>

                    <button onclick="Admin.switchTab('ClassControl')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap"
                        data-tab="ClassControl"><i class="fas fa-edit mr-2 ml-1"></i>تسجيل الحصص</button>

                    <div class="w-px bg-gray-300 mx-1"></div> <!-- Separator -->

                    <button onclick="Admin.switchTab('Users')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap"
                        data-tab="Users"><i class="fas fa-users mr-2 ml-1"></i>المستخدمين</button>

                    <button onclick="Admin.switchTab('Enrollments')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap"
                        data-tab="Enrollments"><i class="fas fa-user-graduate mr-2 ml-1"></i>الطلاب في الفصول</button>

                    <button onclick="Admin.switchTab('Allocations')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap"
                        data-tab="Allocations"><i class="fas fa-link mr-2 ml-1"></i>توزيع المعلمين</button>

                    <div class="w-px bg-gray-300 mx-1"></div> <!-- Separator -->

                    <button onclick="Admin.switchTab('Classes')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap"
                        data-tab="Classes"><i class="fas fa-chalkboard mr-2 ml-1"></i>الفصول</button>

                    <button onclick="Admin.switchTab('Subjects')"
                        class="px-4 py-2 rounded-lg font-bold text-sm bg-white border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 transition whitespace-nowrap"
                        data-tab="Subjects"><i class="fas fa-book mr-2 ml-1"></i>المواد</button>
                </div>

                <!-- LATEST NEWS TICKER (Visible to All) -->


                <!-- Dynamic Content Area -->
                <div id="dashboardContent" class="min-h-[300px]"></div>
            </section>
        </main>

        <!-- BOTTOM NAV (Mobile Only) -->
        <nav id="bottomNav"
            class="bg-white border-t border-gray-200 fixed bottom-0 w-full z-40 hidden md:hidden pb-safe">
            <div class="grid grid-cols-3 h-16">
                <button onclick="App.reload()" class="mobile-nav-item active">
                    <i class="fas fa-home text-xl mb-1"></i>
                    <span>الرئيسية</span>
                </button>
                <button onclick="UI.toggleChangePass()" class="mobile-nav-item">
                    <i class="fas fa-key text-xl mb-1"></i>
                    <span>تأمين</span>
                </button>
                <button onclick="Auth.logout()" class="mobile-nav-item text-red-400">
                    <i class="fas fa-sign-out-alt text-xl mb-1"></i>
                    <span>خروج</span>
                </button>
            </div>
        </nav>

    </div>

    <!-- MODALS -->

    <!-- 1. Password Change Modal -->
    <div id="modal-pass"
        class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 scale-95 opacity-0 transition-transform duration-300"
            id="modal-pass-content">
            <div class="text-center mb-4">
                <div class="bg-amber-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-2">
                    <i class="fas fa-lock text-amber-600 text-xl"></i>
                </div>
                <h3 class="font-bold text-lg">تغيير كلمة المرور</h3>
            </div>
            <input type="password" id="newPass" placeholder="كلمة المرور الجديدة"
                class="w-full mb-4 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
            <div class="flex gap-3">
                <button onclick="Auth.changePassword()"
                    class="flex-1 bg-emerald-600 text-white py-2 rounded-xl font-bold">حفظ</button>
                <button onclick="UI.toggleChangePass(false)"
                    class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- 2. Full Screen Report Modal -->
    <div id="modal-report"
        class="hidden fixed inset-0 z-50 bg-white flex flex-col transition-transform duration-300 translate-y-full">
        <div class="bg-emerald-600 text-white p-4 flex justify-between items-center shadow-md">
            <h3 class="font-bold text-lg" id="reportTitle">تقرير الطالب</h3>
            <button onclick="UI.closeReport()"
                class="bg-white/20 p-2 rounded-full w-8 h-8 flex items-center justify-center hover:bg-white/30"><i
                    class="fas fa-times"></i></button>
        </div>
        <div class="p-4 border-b bg-gray-50 flex gap-2 shadow-sm z-10">
            <input type="date" id="reportDate"
                class="flex-grow p-2 border border-gray-300 rounded-lg outline-none focus:border-emerald-500 font-sans">
            <button onclick="Parent.fetchReport()"
                class="bg-emerald-600 text-white px-4 rounded-lg font-bold shadow-sm hover:bg-emerald-700">
                <i class="fas fa-search"></i>
            </button>
        </div>
        <div id="reportContent" class="flex-grow overflow-y-auto p-4 bg-gray-100 space-y-3 pb-20"></div>
    </div>

    <!-- 3. Admin Edit Modal -->
    <div id="modal-admin-edit"
        class="hidden fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/60 backdrop-blur-sm">
        <div
            class="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl p-6 h-[80vh] sm:h-auto flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="font-bold text-lg" id="adminEditTitle">تعديل / إضافة</h3>
                <button onclick="Admin.closeEdit()" class="text-gray-500 hover:text-red-500"><i
                        class="fas fa-times text-xl"></i></button>
            </div>
            <div id="adminEditForm" class="flex-grow overflow-y-auto space-y-3 p-1"></div>
            <div class="mt-4 pt-2 border-t flex justify-end gap-3">
                <button onclick="Admin.saveData()"
                    class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-emerald-700 shadow-md">حفظ</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 mb-20 md:mb-8 text-center text-gray-400 text-xs pb-4">
        <p>تم التصميم والتطوير بواسطة <span class="font-bold text-emerald-600">دريم وير DreamWare</span></p>
    </footer>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        /*************************************************
         *  CORE CONFIGURATION & STATE
         *************************************************/
        const App = {
            API_URL: "https://script.google.com/macros/s/AKfycbwZW7Ag6XEZSRA8hUP-GnqBMTZauqqh7riffcanAe1HsFjV_srR9iFvlPTld3VrDgFtdw/exec",
            user: null,
            state: {}, // Cache for data

            async init() {
                // Check LocalStorage
                const savedUser = localStorage.getItem('dreams_user');
                if (savedUser) {
                    this.user = JSON.parse(savedUser);
                    this.loadDashboard();
                } else {
                    document.getElementById('view-login').classList.remove('hidden');
                }

                // Register Service Worker for PWA
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js').catch(console.error);
                }
            },

            reload() { location.reload(); },

            async call(action, payload = {}) {
                try {
                    const fd = new FormData();
                    fd.append('action', action);
                    fd.append('payload', JSON.stringify(payload));

                    const res = await fetch(this.API_URL, { method: 'POST', body: fd });
                    const json = await res.json();
                    return json;
                } catch (e) {
                    throw new Error("فشل الاتصال بالخادم. تأكد من الانترنت.");
                }
            }
        };

        /*************************************************
         *  UI UTILITIES
         *************************************************/
        const UI = {
            loader(show) {
                const el = document.getElementById('globalLoader');
                if (show) el.classList.remove('hidden');
                else el.classList.add('hidden');
            },

            showError(msg) {
                // Simple Toast implementation
                const toast = document.createElement('div');
                toast.className = "fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg z-[100] text-sm font-bold flex items-center gap-2 fade-in";
                toast.innerHTML = `<i class="fas fa-info-circle text-yellow-400"></i> ${msg}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            toggleChangePass(show = true) {
                const m = document.getElementById('modal-pass');
                const c = document.getElementById('modal-pass-content');
                if (show) {
                    m.classList.remove('hidden');
                    setTimeout(() => { c.classList.remove('scale-95', 'opacity-0') }, 10);
                } else {
                    c.classList.add('scale-95', 'opacity-0');
                    setTimeout(() => { m.classList.add('hidden') }, 300);
                }
            },

            closeReport() {
                const m = document.getElementById('modal-report');
                m.classList.remove('translate-y-0');
                m.classList.add('translate-y-full');
                setTimeout(() => m.classList.add('hidden'), 300);
            },

            openReport() {
                const m = document.getElementById('modal-report');
                m.classList.remove('hidden');
                // Force reflow
                void m.offsetWidth;
                m.classList.remove('translate-y-full');
                m.classList.add('translate-y-0');
            },

            formatName(fullName) {
                if (!fullName) return "";
                const parts = fullName.trim().split(/\s+/);
                if (parts.length <= 3) return fullName;
                return `${parts[0]} ${parts[1]} ${parts[2]}`;
            }
        };

        /*************************************************
         *  AUTHENTICATION
         *************************************************/
        const Auth = {
            async login(e) {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                const originalText = btn.innerHTML;

                // UI Loading
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
                btn.disabled = true;
                document.getElementById('loginError').classList.add('hidden');

                try {
                    const phone = document.getElementById('loginPhone').value;
                    const pass = document.getElementById('loginPass').value;
                    const res = await App.call('login', { phone, password: pass });

                    if (res.success) {
                        App.user = res;
                        localStorage.setItem('dreams_user', JSON.stringify(res));
                        App.loadDashboard();
                    } else {
                        document.getElementById('loginError').innerText = res.message;
                        document.getElementById('loginError').classList.remove('hidden');
                    }
                } catch (err) {
                    document.getElementById('loginError').innerText = err.message;
                    document.getElementById('loginError').classList.remove('hidden');
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            },

            logout() {
                localStorage.removeItem('dreams_user');
                location.reload();
            },

            async changePassword() {
                const newPass = document.getElementById('newPass').value;
                if (!newPass) return UI.showError("ادخل كلمة المرور الجديدة");

                UI.loader(true);
                try {
                    const res = await App.call('changePassword', { userId: App.user.userId, newPass });
                    UI.showError(res.message);
                    if (res.success) {
                        UI.toggleChangePass(false);
                        document.getElementById('newPass').value = '';
                    }
                } catch (e) { UI.showError(e.message); }
                UI.loader(false);
            }
        };

        /*************************************************
         *  MAIN LOGIC
         *************************************************/
        App.loadDashboard = function () {
            // 1. Hide Login, Show Dash
            document.getElementById('view-login').classList.add('hidden');
            const dash = document.getElementById('view-dashboard');
            dash.classList.remove('hidden');

            // 2. Setup Headers
            document.getElementById('topNav').classList.remove('hidden');
            if (window.innerWidth < 768) document.getElementById('bottomNav').classList.remove('hidden');

            // 3. User Info
            // 3. User Info
            if (this.user.phone === '01550117880') {
                document.getElementById('dashWelcome').innerText = `${UI.formatName(this.user.name)}`;
            } else {
                document.getElementById('dashWelcome').innerText = `${UI.formatName(this.user.name)}`;
            }
            const roleMap = { 'Admin': 'الإدارة', 'Teacher': 'هيئة التدريس', 'Parent': 'ولي أمر', 'Supervisor': 'مشرف' };
            document.getElementById('dashRole').innerText = roleMap[this.user.role] || this.user.role;

            // 4. Load Role-Specific Content
            if (this.user.role === 'Admin') Admin.init(false);
            else if (this.user.role === 'Supervisor') Admin.init(true);
            else if (this.user.role === 'Teacher') Teacher.init();
            else if (this.user.role === 'Parent') Parent.init();
            else {
                alert("Role not recognized: " + this.user.role);
                document.getElementById('dashboardContent').innerHTML = '<div class="p-10 text-center">Invalid User Role</div>';
                return;
            }


        };

        /*************************************************
         *  ADMIN MODULE
         *************************************************/
        const Admin = {
            currentTab: 'Stats',
            isSupervisor: false,
            cache: {},
            lookups: { teachers: [], classes: [], subjects: [], students: [] },

            async init(isSupervisor = false) {
                this.isSupervisor = isSupervisor;
                document.getElementById('adminTabs').classList.remove('hidden');

                // Reset all tabs
                document.querySelectorAll('#adminTabs button').forEach(b => b.classList.remove('hidden'));

                // Supervisor Restrictions
                // Only: Allocations (Monitoring via button if exists, wait, Supervisor needs Monitoring too)
                // Supervisor sees: Allocations, Monitoring. 
                // Hides: Stats, Users, Classes, Subjects, Enrollments
                if (this.isSupervisor) {
                    ['Stats', 'Users', 'Classes', 'Subjects', 'Enrollments'].forEach(t => {
                        const btn = document.querySelector(`button[data-tab="${t}"]`);
                        if (btn) btn.classList.add('hidden');
                    });
                    this.switchTab('Allocations');
                } else {
                    this.switchTab('Stats');
                }

                try {
                    const res = await App.call('getAdminLookups');
                    if (res.success) {
                        this.lookups = res;
                        // Pre-format Class Names to include Number
                        this.lookups.classes.forEach(c => {
                            c.displayName = `${c.name} ${c.number ? '- ' + c.number : ''}`;
                        });
                        // Format Names in Lookups
                        this.lookups.teachers.forEach(t => t.name = UI.formatName(t.name));
                        this.lookups.students.forEach(s => s.name = UI.formatName(s.name));
                    }
                } catch (e) { console.error("Failed to load lookups", e); }

            allData: [], // Store raw data for filtering
            currentHeader: [],

            async switchTab(tab) {
                this.currentTab = tab;
                // Update UI tabs
                document.querySelectorAll('#adminTabs button').forEach(b => {
                    b.classList.remove('bg-emerald-50', 'text-emerald-600', 'border-emerald-200');
                    if (b.dataset.tab === tab) b.classList.add('bg-emerald-50', 'text-emerald-600', 'border-emerald-200');
                });

                const content = document.getElementById('dashboardContent');
                content.innerHTML = '<div class="text-center p-10"><div class="spinner mx-auto border-gray-300 border-t-emerald-500"></div></div>';

                if (tab === 'Stats') return this.loadStats();
                if (tab === 'Monitoring') return this.renderMonitoring();
                if (tab === 'ClassControl') return this.renderClassControl();

                // Load Data Table
                try {
                    let res;
                    try {
                        res = await App.call('adminGetData', { type: tab });
                        if (!res.success) throw new Error(res.message);
                    } catch (err) {
                        console.warn("Backend unavailable, returning empty list", err);
                        // Mock Data Fallback for Tables
                        res = { success: true, header: ['Info'], data: [['Backend Not Deployed']] };
                        if (tab === 'Subjects') res.header = ['المعرف', 'اسم المادة'], res.data = [];
                        if (tab === 'Users') res.header = ['المعرف', 'الاسم', 'الدور', 'الهاتف', 'كلمة المرور', 'نشط'], res.data = [];
                    }

                    this.allData = res.data || [];
                    this.currentHeader = res.header;

                    // Render Filters & Table
                    this.renderFilters(tab);
                    this.applyFilters();

                    content.innerHTML = `<div class="bg-red-100 text-red-600 p-4 rounded-xl text-center">${e.message}</div>`;

            renderFilters(tab) {
                const content = document.getElementById('dashboardContent');

                if (tab === 'Users') {
                    filterHtml = `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 flex gap-4 items-center">

                                <option value="Parent">ولي أمر</option>

                            </select>
                        </div>
                        <div id="tableContainer"></div>
                    `;
                } else if (tab === 'Allocations') {
                    // Allocations: [ID, TeacherID, ClassID, SubjectID]
                    filterHtml = `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 flex flex-wrap gap-4 items-center">
                            <span class="font-bold text-gray-700 text-sm"><i class="fas fa-filter text-emerald-500 ml-2"></i>تصفية حسب:</span>
                            
                            <select id="filterClass" onchange="Admin.applyFilters()" class="p-2 border rounded-lg text-sm outline-none focus:border-emerald-500">
                                <option value="">كل الفصول</option>

                            </select>

                            <select id="filterSubject" onchange="Admin.applyFilters()" class="p-2 border rounded-lg text-sm outline-none focus:border-emerald-500">
                                <option value="">كل المواد</option>

                            <select id="filterTeacher" onchange="Admin.applyFilters()" class="p-2 border rounded-lg text-sm outline-none focus:border-emerald-500">
                                <option value="">كل المعلمين</option>

                            </select>
                        </div>
                        </div>
                        <div id="tableContainer"></div>
                    `;
                } else if (tab === 'Enrollments') {
                    filterHtml = `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 flex flex-wrap gap-4 items-center">
                            <span class="font-bold text-gray-700 text-sm"><i class="fas fa-filter text-emerald-500 ml-2"></i>تصفية حسب:</span>
                            <select id="filterClass" onchange="Admin.applyFilters()" class="p-2 border rounded-lg text-sm outline-none focus:border-emerald-500">
                                <option value="">كل الفصول</option>
                                ${this.lookups.classes.map(c => `<option value="${c.id}">${c.displayName}</option>`).join('')}
                            </select>
                        </div>

                    `;
                } else {
                    filterHtml = `<div id="tableContainer"></div>`;
                }

                // Add Bulk Action Bar (Hidden by default)
                filterHtml += `
                    <div id="bulkActionBar" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-4 hidden transition-all duration-300 border border-gray-700">
                        <span class="font-bold text-sm text-emerald-400"><span id="selectedCount" class="text-white">0</span> طالب محدد</span>
                        <div class="h-4 w-px bg-gray-700"></div>
                        <button onclick="Admin.openBulkMove()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-1.5 rounded-full font-bold text-xs transition flex items-center shadow-lg shadow-emerald-900/50">
                            <i class="fas fa-exchange-alt ml-2"></i>نقل الفصل
                        </button>
                        <button onclick="Admin.clearSelection()" class="text-gray-400 hover:text-white transition p-1"><i class="fas fa-times"></i></button>
                    </div>
                `;

                content.innerHTML = filterHtml;
            },

            applyFilters() {
                const tab = this.currentTab;
                let filtered = this.allData;

                if (tab === 'Users') {
                    const role = document.getElementById('filterStart') ? document.getElementById('filterStart').value : '';
                    if (role) {
                        // Role is at Index 2
                        filtered = filtered.filter(row => row[2] === role);
                    }
                } else if (tab === 'Allocations') {
                    const classId = document.getElementById('filterClass') ? document.getElementById('filterClass').value : '';
                    const subId = document.getElementById('filterSubject') ? document.getElementById('filterSubject').value : '';
                    const teacherId = document.getElementById('filterTeacher') ? document.getElementById('filterTeacher').value : '';


                    // Allocations: [ID, TeacherID, ClassID, SubjectID, Year]
                    if (classId) filtered = filtered.filter(row => String(row[2]) === String(classId));
                    if (subId) filtered = filtered.filter(row => String(row[3]) === String(subId));
                    if (teacherId) filtered = filtered.filter(row => String(row[1]) === String(teacherId));
                } else if (tab === 'Enrollments') {
                    const classId = document.getElementById('filterClass') ? document.getElementById('filterClass').value : '';

            },

            },

            renderTable(type, header, data) {
                this.cache[type] = { header, data: data || [] }; // Store for edit

                // Arabic Headers Map
                const headerMap = {
                    'Users': ['المعرف', 'الاسم', 'الدور', 'الهاتف', 'كلمة المرور', 'نشط'],
                    'Classes': ['معرف الفصل', 'اسم الفصل', 'رقم الفصل'], // Modified: No Supervisor, No Notes
                    'Subjects': ['المعرف', 'اسم المادة', 'الاسم الانجليزي'],
                    'Allocations': ['معرف التوزيع', 'المعلم', 'الفصل', 'المادة', 'السنة'],
                    'Enrollments': ['معرف القيد', 'الطالب', 'الفصل']
                };
                const displayHeader = headerMap[type] || header;

                // Helper to resolve IDs to Names
                const resolveCell = (val, colIndex) => {
                    const format = (v) => UI.formatName(v);

                    if (type === 'Users' && colIndex === 1) return format(val); // Name
                    if (type === 'Users' && colIndex === 2) { // Role
                        const map = { 'Admin': 'مدير', 'Teacher': 'معلم', 'Parent': 'ولي أمر', 'Supervisor': 'مشرف' };
                        return map[val] || val;
                    }
                    if (type === 'Allocations') {
                        if (colIndex === 1) return this.getName(this.lookups.teachers, val); // Teacher
                        if (colIndex === 2) return this.getName(this.lookups.classes, val); // Class
                        if (colIndex === 3) return this.getName(this.lookups.subjects, val); // Subject
                    }
                    if (type === 'Enrollments') {
                        if (colIndex === 1) return this.getName(this.lookups.students, val); // Student
                        if (colIndex === 2) return this.getName(this.lookups.classes, val); // Class
                    }
                    return val;
                };

                const safeData = data || [];
                const tableRows = safeData.map((row, rIndex) => `
                    <tr class="hover:bg-gray-50 border-b last:border-0 transition">
                        ${type === 'Enrollments' ? `<td class="p-3"><input type="checkbox" class="row-checkbox w-4 h-4 accent-emerald-600" value="${row[0]}" onchange="Admin.updateSelection()"></td>` : ''}
                        ${row.map((cell, cIndex) => {
                    if (cIndex === 0) return ''; // Hide ID Column
                    if (type === 'Allocations' && cIndex === 4) return ''; // Hide Year
                    if (type === 'Subjects' && cIndex === 2) return ''; // Hide English Name (Auto)

                    return `
                                <td class="p-3 text-sm text-gray-600 whitespace-nowrap overflow-hidden text-ellipsis max-w-xs" title="${cell}">
                                    ${resolveCell(cell, cIndex)}
                                </td>
                            `;
                }).join('')}
                        <td class="p-3 flex gap-2 justify-end">
                            <button onclick="Admin.openEdit('${type}', ${rIndex})" class="text-blue-500 hover:bg-blue-50 p-2 rounded"><i class="fas fa-edit"></i></button>
                            <button onclick="Admin.deleteItem('${type}', '${row[0]}')" class="text-red-500 hover:bg-red-50 p-2 rounded"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');

                const html = `
                    <div class="mb-4 flex justify-between items-center">
                        <h3 class="font-bold text-lg text-gray-700">إدارة ${type === 'Allocations' ? 'توزيع المعلمين' : (headerMap[type] ? displayHeader[1] : type)}</h3> <!-- Use 2nd col name as loose title if avail -->
                        <button onclick="Admin.openEdit('${type}', -1)" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-emerald-700 transition">
                            <i class="fas fa-plus ml-2"></i>إضافة
                        </button>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                        <table class="w-full text-right">
                            <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-bold">
                                <tr>
                                    ${type === 'Enrollments' ? '<th class="p-3 w-10"><input type="checkbox" onchange="Admin.toggleSelectAll(this)" class="w-4 h-4 accent-emerald-600"></th>' : ''}
                                    ${(displayHeader || []).map((h, i) => {
                    if (i === 0) return '';
                    if (type === 'Allocations' && i === 4) return '';
                    if (type === 'Subjects' && i === 2) return '';
                    return `<th class="p-3 whitespace-nowrap">${h}</th>`;
                }).join('')}
                                    <th class="p-3 w-20">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${tableRows.length ? tableRows : '<tr><td colspan="100" class="p-8 text-center text-gray-400">لا توجد بيانات</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;

                const container = document.getElementById('tableContainer') || document.getElementById('dashboardContent');
                container.innerHTML = html;
            },

            getName(list, id) {
                const item = list.find(i => String(i.id) === String(id));
                return item ? (item.displayName || item.name) : id;
            },

            openEdit(type, rowIndex) {
                const isNew = rowIndex === -1;
                const header = this.cache[type].header;
                const row = isNew ? header.map(() => "") : this.cache[type].data[rowIndex];

                this.tempEdit = { type, id: row[0], isNew }; // Save context

                document.getElementById('adminEditTitle').innerText = isNew ? `إضافة` : `تعديل`;

                // INPUT BUILDER
                const formHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${header.map((h, i) => {
                    const isReadOnly = (i === 0 && !isNew); // ID is readonly on edit
                    let inputField = '';

                    // 1. Users Role Dropdown (Column Index 2)
                    if (type === 'Users' && i === 2) {
                        inputField = `
                                <div class="relative">
                                    <select id="edit_f_${i}" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl appearance-none outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition text-gray-700 font-bold">
                                        <option value="Teacher" ${row[i] === 'Teacher' ? 'selected' : ''}>معلم</option>
                                        <option value="Parent" ${row[i] === 'Parent' ? 'selected' : ''}>ولي أمر</option>
                                        <option value="Admin" ${row[i] === 'Admin' ? 'selected' : ''}>إدارة</option>
                                        <option value="Supervisor" ${row[i] === 'Supervisor' ? 'selected' : ''}>مشرف</option>
                                    </select>
                                    <div class="absolute left-3 top-3.5 text-gray-400 pointer-events-none"><i class="fas fa-chevron-down"></i></div>
                                </div>
                            `;
                    }
                    // 2. Allocations - Teacher (Col 1)
                    else if (type === 'Allocations' && i === 1) {
                        inputField = this.buildSelect(i, this.lookups.teachers, row[i]);
                    }
                    // 3. Allocations - Class (Col 2)
                    else if (type === 'Allocations' && i === 2) {
                        inputField = this.buildSelect(i, this.lookups.classes, row[i]);
                    }
                    // 4. Allocations - Subject (Col 3)
                    else if (type === 'Allocations' && i === 3) {
                        inputField = this.buildSelect(i, this.lookups.subjects, row[i]);
                    }
                    // 5. Enrollments - Student (Col 1)
                    else if (type === 'Enrollments' && i === 1) {
                        inputField = this.buildSelect(i, this.lookups.students, row[i]);
                    }
                    // 6. Enrollments - Class (Col 2)
                    else if (type === 'Enrollments' && i === 2) {
                        inputField = this.buildSelect(i, this.lookups.classes, row[i]);
                    }
                    // Default Text Input
                    else {
                        inputField = isReadOnly ?
                            `<div class="bg-gray-100 p-3 rounded-xl border border-gray-200 text-gray-500 font-mono text-sm select-all">${row[i]}</div><input type="hidden" id="edit_f_${i}" value="${row[i]}">` :
                            `<input type="text" id="edit_f_${i}" value="${row[i]}" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition font-bold text-gray-700 placeholder-gray-300" placeholder="${h}">`;
                    }

                    // Show Arabic Label if available
                    const headerMap = {
                        'Users': ['المعرف', 'الاسم', 'الدور', 'الهاتف', 'كلمة المرور', 'نشط'],
                        'Classes': ['معرف الفصل', 'اسم الفصل', 'رقم الفصل'],
                        'Subjects': ['المعرف', 'اسم المادة', 'الاسم الانجليزي'],
                        'Allocations': ['معرف التوزيع', 'المعلم', 'الفصل', 'المادة', 'السنة'],
                        'Enrollments': ['معرف القيد', 'الطالب', 'الفصل']
                    };
                    const label = (headerMap[type] && headerMap[type][i]) ? headerMap[type][i] : h;

                    // HIDE AUTO/SYSTEM FIELDS
                    // 0: ID (All)
                    // 2: English Name (Subjects - Auto)
                    // 4: Year (Allocations - Auto)
                    if (i === 0 || (type === 'Subjects' && i === 2) || (type === 'Allocations' && i === 4)) {
                        return isReadOnly ? `<div class="hidden">${inputField}</div>` : ''; // Just hidden input for ID
                    }

                    return `
                            <div class="col-span-1">
                                <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">${label}</label>
                                ${inputField}
                            </div>
                         `;
                }).join('')}
                    </div>
                `;

                document.getElementById('adminEditForm').innerHTML = formHtml;
                document.getElementById('modal-admin-edit').classList.remove('hidden');
            },

            buildSelect(idx, list, selectedVal) {
                return `
                    <div class="relative">
                        <select id="edit_f_${idx}" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl appearance-none outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition text-gray-700 font-bold" required>
                            <option value="">-- اختر --</option>
                            ${list.map(item => `<option value="${item.id}" ${String(item.id) === String(selectedVal) ? 'selected' : ''}>${item.displayName || item.name}</option>`).join('')}
                        </select>
                        <div class="absolute left-3 top-3.5 text-gray-400 pointer-events-none"><i class="fas fa-chevron-down"></i></div>
                    </div>
                `;
            },

            closeEdit() {
                document.getElementById('modal-admin-edit').classList.add('hidden');
            },

            async saveData() {
                const { type, id, isNew } = this.tempEdit;
                const header = this.cache[type].header;
                const newData = header.map((_, i) => document.getElementById(`edit_f_${i}`).value);

                UI.loader(true);
                try {
                    let res;
                    if (isNew) {
                        res = await App.call('adminSaveData', { type, data: newData });
                    } else {
                        res = await App.call('adminUpdateData', { type, id, data: newData });
                        // Refresh Lookups if we modified lookup tables
                        if (['Users', 'Classes', 'Subjects'].includes(type)) {
                            const l = await App.call('getAdminLookups');
                            if (l.success) this.lookups = l;
                        }
                    }

                    if (res.success) {
                        UI.showError("تم الحفظ بنجاح");
                        this.closeEdit();
                        this.switchTab(type); // Reload UI
                    } else {
                        alert(res.message);
                    }
                } catch (e) { alert(e.message); }
                UI.loader(false);
            },

            async deleteItem(type, id) {
                if (!confirm('هل أنت متأكد من الحذف؟ لا يمكن التراجع.')) return;

                UI.loader(true);
                try {
                    const res = await App.call('adminDeleteData', { type, id });
                    if (res.success) {
                        UI.showError("تم الحذف");
                        // Refresh Lookups
                        if (['Users', 'Classes', 'Subjects'].includes(type)) {
                            const l = await App.call('getAdminLookups');
                            if (l.success) this.lookups = l;
                        }
                        this.switchTab(type);
                    } else {
                        alert(res.message);
                    }
                } catch (e) { alert(e.message); }
                UI.loader(false);
            },

            async renderMonitoring() {
                const content = document.getElementById('dashboardContent');

                const html = `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6 flex flex-col md:flex-row gap-4 items-end animate-fadeIn">

                                <option value="">-- اختر الفصل --</option>
                                <option value="ALL" class="font-bold text-emerald-600">📌 كل الفصول (متابعة شاملة)</option>
                                ${this.lookups.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="w-full md:w-48">
                            <label class="block text-gray-500 text-sm font-bold mb-2">التاريخ</label>
                            <input type="date" id="monitorDate" class="w-full p-2 border rounded-lg outline-none focus:border-emerald-500 bg-gray-50 font-bold text-gray-700">
                        </div>
                        <button onclick="Admin.fetchMonitoringSeries()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-emerald-700 w-full md:w-auto transition active:scale-95">
                            <i class="fas fa-search ml-2"></i>عرض
                        </button>
                    </div>
                    <div id="monitoringResults" class="space-y-6 min-h-[300px]">
                        <div class="text-center text-gray-400 mt-10">
                            <i class="fas fa-search text-4xl mb-2 opacity-20"></i>
                            <p>اختر الفصل والتاريخ للمتابعة</p>
                        </div>
                    </div>
                `;
                content.innerHTML = html;
                document.getElementById('monitorDate').value = new Date().toISOString().split('T')[0];
            },

            async fetchMonitoringSeries() {
                const classId = document.getElementById('monitorClass').value;
                const date = document.getElementById('monitorDate').value;
                if (!classId) return UI.showError("اختر الفصل أولاً");

                const resDiv = document.getElementById('monitoringResults');
                resDiv.innerHTML = '<div class="spinner mx-auto border-gray-300 border-t-emerald-600 mt-10"></div>';

                try {

            // switchTab(tab) { ... } // REMOVED

            async loadLogForm(idxOrObj, targetId = 'teacherWorkArea') {
                // Determine Mode: Teacher (Index) or Admin (Object)
                let cls;
                if (typeof idxOrObj === 'object') {
                    cls = idxOrObj; // Admin Mode
                } else {
                    if (idxOrObj === "") { document.getElementById(targetId).innerHTML = ""; return; }
                    cls = this.classes[idxOrObj]; // Teacher Mode
                }

                this.currentClass = cls;
                this.currentTargetId = targetId; // Save for submitLog cleanup

                const area = document.getElementById(targetId);
                if (!area) return console.error("Target area not found: " + targetId);

                area.innerHTML = '<div class="spinner mx-auto"></div>';

                try {
                    const res = await App.call('getClassStudents', { classId: cls.classId });

                    // Build Student List (Attendance)
                    const studentsHtml = res.students.map(s => `
                        <div class="flex items-center justify-between p-3 bg-white border-b last:border-0 hover:bg-gray-50 transition">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" id="chk_${s.id}" class="w-6 h-6 accent-emerald-600 cursor-pointer rounded transition-transform transform active:scale-95" checked>
                                <label for="chk_${s.id}" class="font-bold text-gray-700 cursor-pointer select-none">${UI.formatName(s.name)}</label>
                            </div>
                            <input type="text" id="note_${s.id}" placeholder="ملاحظة..." class="text-xs p-2 border border-gray-200 rounded-lg w-1/3 bg-gray-50 focus:bg-white focus:border-emerald-500 outline-none transition">
                        </div>
                     `).join('');

                    area.innerHTML = `
                        <div class="grid lg:grid-cols-2 gap-6 animate-fadeIn">
                            <!-- Left: Log Content -->
                            <div class="space-y-4">
                                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                    <div class="flex items-center gap-2 mb-2 text-emerald-700 font-bold"><i class="fas fa-chalkboard-teacher"></i> محتوى الحصة</div>
                                    <textarea id="logContent" class="w-full h-32 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 resize-none" placeholder="ماذا تم شرحه اليوم؟"></textarea>
                                </div>
                                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                    <div class="flex items-center gap-2 mb-2 text-orange-600 font-bold"><i class="fas fa-home"></i> الواجب المنزلي</div>
                                    <textarea id="logHW" class="w-full h-24 p-3 bg-orange-50 border border-orange-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 resize-none" placeholder="تفاصيل الواجب..."></textarea>
                                </div>
                            </div>
                            
                            <!-- Right: Attendance -->
                            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[500px]">
                                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                                    <div class="font-bold text-gray-700"><i class="fas fa-user-check text-emerald-600"></i> القائمة</div>
                                    <button onclick="Teacher.toggleAll()" class="text-xs font-bold bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg hover:bg-emerald-200 transition">تحديد الكل (حاضر)</button>
                                </div>
                                <div class="overflow-y-auto flex-grow p-1 custom-scrollbar">
                                    ${res.students.length ? studentsHtml : '<div class="p-10 text-center text-gray-400">لا يوجد طلاب في هذا الفصل</div>'}
                                </div>
                                <div class="p-4 border-t bg-gray-50">
                                    <button onclick="Teacher.submitLog()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-emerald-700 transition transform active:scale-95">
                                        <i class="fas fa-save ml-2"></i> حفظ التقرير اليومي
                                    </button>
                                </div>
                            </div>
                        </div>
                     `;
                } catch (e) { area.innerHTML = `<div class="text-red-500 text-center p-10">${e.message}</div>`; }
            },

            toggleAll() {
                const checkboxes = document.querySelectorAll('[id^="chk_"]');
                const allChecked = Array.from(checkboxes).every(c => c.checked);
                checkboxes.forEach(c => c.checked = !allChecked);
            },

            async submitLog() {
                const content = document.getElementById('logContent').value;
                const hw = document.getElementById('logHW').value;

                // Collect Status
                const studentsStatus = [];
                document.querySelectorAll('[id^="chk_"]').forEach(chk => {
                    const sid = chk.id.replace('chk_', '');
                    const note = document.getElementById(`note_${sid}`).value;
                    const isPresent = chk.checked;
                    studentsStatus.push({
                        id: sid,
                        status: isPresent ? 'Present' : 'Absent',
                        note: note.trim()
                    });
                });

                if (!content && !hw) return alert("الرجاء كتابة محتوى الحصة أو الواجب");

                // OPTIMISTIC UI: Show success immediately
                UI.showError("تم الحفظ بنجاح (جاري المزامنة...)", "green");

                // Clear Form immediately
                document.getElementById('logContent').value = '';
                document.getElementById('logHW').value = '';
                // Reset Checkboxes (Default Checked/Present)
                document.querySelectorAll('[id^="chk_"]').forEach(c => c.checked = true);
                document.querySelectorAll('[id^="note_"]').forEach(n => n.value = '');

                // Send in background without blocking UI
                App.call('saveDailyLog', {
                    teacherId: App.user.userId,
                    classId: this.currentClass.classId,
                    subjectId: this.currentClass.subjectId,
                    date: new Date(),
                    content,
                    homework: hw,
                    studentsStatus
                }).then(res => {
                    if (!res.success) {
                        alert("فشل الحفظ في الخلفية! يرجى المحاولة مرة أخرى: " + res.message);
                    }
                }).catch(e => {
                    console.error(e);
                    alert("خطأ في الشبكة أثناء الحفظ");
                });

                // Reset Select if in Teacher Mode
                const sel = document.getElementById('teacherClassSelect');
                if (sel && !sel.classList.contains('hidden')) {
                    const selectEl = sel.querySelector('select');
                    if (selectEl) selectEl.value = "";
                }

                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
        };



        // Initialize App
        document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>

</html>
