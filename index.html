<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreams Schools System</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10B981">

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Dreams Schools">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS App Icons (multiple sizes for different devices) -->
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <link rel="apple-touch-icon" sizes="152x152" href="logo.png">
    <link rel="apple-touch-icon" sizes="120x120" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <!-- SEO & Open Graph -->
    <meta name="description" content="نظام الإدارة المدرسية الذكي - Dreams Schools">
    <meta property="og:title" content="Dreams Schools System">
    <meta property="og:description" content="نظام الإدارة المدرسية الذكي">
    <meta property="og:type" content="website">

    <!-- Styles & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 min-h-screen text-right">

    <!-- GLOBAL LOADER -->
    <div id="globalLoader" class="loader-wrapper hidden">
        <div class="spinner"></div>
        <p class="mt-4 text-emerald-600 font-bold animate-pulse">جاري التحميل...</p>
    </div>

    <!-- APP CONTAINER -->
    <div id="app" class="max-w-md mx-auto sm:max-w-full min-h-screen flex flex-col relative overflow-hidden">

        <!-- TOP NAV (Desktop/Admin) -->
        <header id="topNav"
            class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-40 sticky top-0 hidden">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="w-8 h-8 rounded-lg object-contain" alt="Dreams Schools Logo">
                <h1 class="font-bold text-lg text-emerald-700">Dreams Schools</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="UI.toggleChangePass()"
                    class="text-gray-500 hover:text-emerald-600 transition p-2 rounded-full hover:bg-emerald-50"
                    title="تغيير كلمة المرور">
                    <i class="fas fa-key"></i>
                </button>
                <button onclick="Auth.logout()"
                    class="text-red-500 hover:text-red-700 transition p-2 rounded-full hover:bg-red-50" title="خروج">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- VIEWS -->
        <main id="mainContent" class="flex-grow p-4 relative z-0">
            <!-- LOGIN VIEW -->
            <section id="view-login"
                class="absolute inset-0 z-50 bg-gradient-to-br from-slate-900 via-emerald-900 to-slate-900 flex flex-col items-center justify-center p-6">

                <div class="w-full max-w-sm relative z-10">
                    <!-- Glass Card -->
                    <div
                        class="bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-white/20 transform transition-all hover:scale-[1.01]">

                        <!-- Logo inside card -->
                        <div class="text-center mb-6">
                            <div class="flex items-center justify-center mx-auto mb-3">
                                <div class="logo-3d-wrapper">
                                    <img src="logo.png" class="logo-3d w-40 h-40 object-contain"
                                        alt="Dreams Schools Logo">
                                </div>
                            </div>
                            <p class="text-slate-500 font-medium text-sm">نظام الإدارة المدرسية الذكي</p>
                        </div>

                        <form onsubmit="Auth.login(event)">
                            <div class="mb-5 relative group">
                                <i
                                    class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-emerald-500 transition pointer-events-none"></i>
                                <input type="tel" id="loginPhone" placeholder="رقم الهاتف"
                                    class="w-full pr-12 pl-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition font-bold text-gray-700"
                                    required>
                            </div>
                            <div class="mb-8 relative group">
                                <i
                                    class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-emerald-500 transition pointer-events-none"></i>
                                <input type="password" id="loginPass" placeholder="كلمة المرور"
                                    class="w-full pr-12 pl-12 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition font-bold text-gray-700"
                                    required>
                                <button type="button" id="togglePassBtn"
                                    onclick="(function(){const i=document.getElementById('loginPass');const b=document.getElementById('togglePassBtn').querySelector('i');if(i.type==='password'){i.type='text';b.className='fas fa-eye-slash';}else{i.type='password';b.className='fas fa-eye';}})()"
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-emerald-500 transition cursor-pointer bg-transparent border-none p-0">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <button type="submit"
                                class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-500/30 transition transform active:scale-[0.98] flex justify-center items-center gap-2 text-lg">
                                <span>تسجيل الدخول</span>
                                <i class="fas fa-arrow-left text-sm"></i>
                            </button>
                        </form>
                        <p id="loginError"
                            class="text-red-500 text-center mt-6 text-sm hidden bg-red-50 p-3 rounded-xl border border-red-100 font-bold animate-pulse">
                        </p>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-8 text-white/40 text-xs font-sans tracking-wide">
                        <p class="mb-1">© 2026 Dreams School System</p>
                        <p class="flex items-center justify-center gap-1">
                            Designed and Developed by <span class="font-bold text-emerald-400">DreamWare</span>
                        </p>
                    </div>
                </div>
            </section>

            <!-- DASHBOARDS -->
            <section id="view-dashboard" class="hidden fade-in space-y-6 max-w-6xl mx-auto">
                <!-- Welcome Card -->
                <div
                    class="bg-gradient-to-l from-emerald-600 to-teal-500 rounded-2xl p-6 text-white shadow-lg flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold mb-1" id="dashWelcome">أهلاً، حازم</h2>
                        <p class="text-emerald-100 text-sm opacity-90" id="dashRole">مدير النظام</p>
                    </div>
                    <div class="bg-white/20 p-3 rounded-full backdrop-blur-sm">
                        <i class="fas fa-user-circle text-3xl"></i>
                    </div>
                </div>

                <!-- Admin Tabs - Clean Redesign -->
                <div id="adminTabs" class="hidden">

                    <!-- Nav Row -->
                    <div
                        class="bg-white border border-gray-200 rounded-2xl shadow-sm p-2 flex flex-wrap gap-1 items-center">

                        <!-- 1. Dashboard - always visible -->
                        <button onclick="Admin.switchTab('Stats')" data-tab="Stats"
                            class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm text-gray-600 hover:bg-emerald-50 hover:text-emerald-700 transition-all">
                            <i class="fas fa-home text-emerald-500"></i>
                            <span>الرئيسية</span>
                        </button>

                        <div class="w-px h-6 bg-gray-200 mx-1"></div>

                        <!-- 2. Academic Group -->
                        <div class="relative group" id="grp-Academic">
                            <button
                                class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm text-gray-600 hover:bg-teal-50 hover:text-teal-700 transition-all">
                                <i class="fas fa-graduation-cap text-teal-500"></i>
                                <span>التعليم</span>
                                <i class="fas fa-chevron-down text-xs opacity-40 mr-1"></i>
                            </button>
                            <div class="absolute top-full right-0 pt-2 w-52 hidden group-hover:block z-50">
                                <div class="bg-white border border-gray-100 rounded-2xl shadow-2xl overflow-hidden p-1">
                                    <button onclick="Admin.switchTab('Classes')" data-tab="Classes"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-teal-50 hover:text-teal-700 rounded-xl transition">
                                        <i class="fas fa-chalkboard w-4 text-teal-400"></i>الفصول
                                    </button>
                                    <button onclick="Admin.switchTab('Subjects')" data-tab="Subjects"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-teal-50 hover:text-teal-700 rounded-xl transition">
                                        <i class="fas fa-book w-4 text-teal-400"></i>المواد الدراسية
                                    </button>
                                    <button onclick="Admin.switchTab('Allocations')" data-tab="Allocations"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-teal-50 hover:text-teal-700 rounded-xl transition">
                                        <i class="fas fa-link w-4 text-teal-400"></i>توزيع المعلمين
                                    </button>
                                    <button onclick="Admin.switchTab('Enrollments')" data-tab="Enrollments"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-teal-50 hover:text-teal-700 rounded-xl transition">
                                        <i class="fas fa-user-graduate w-4 text-teal-400"></i>قيود الفصول
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 3. People Group -->
                        <div class="relative group" id="grp-People">
                            <button
                                class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm text-gray-600 hover:bg-blue-50 hover:text-blue-700 transition-all">
                                <i class="fas fa-users text-blue-500"></i>
                                <span>الأفراد</span>
                                <i class="fas fa-chevron-down text-xs opacity-40 mr-1"></i>
                            </button>
                            <div class="absolute top-full right-0 pt-2 w-52 hidden group-hover:block z-50">
                                <div class="bg-white border border-gray-100 rounded-2xl shadow-2xl overflow-hidden p-1">
                                    <button onclick="Admin.switchTab('Users')" data-tab="Users"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-700 rounded-xl transition">
                                        <i class="fas fa-user-shield w-4 text-blue-400"></i>المستخدمين
                                    </button>
                                    <button onclick="Admin.switchTab('StudentsManagement')"
                                        data-tab="StudentsManagement"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-700 rounded-xl transition">
                                        <i class="fas fa-users-cog w-4 text-blue-400"></i>إدارة الطلاب
                                    </button>
                                    <button onclick="Admin.switchTab('ParentsManagement')" data-tab="ParentsManagement"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-700 rounded-xl transition">
                                        <i class="fas fa-user-friends w-4 text-blue-400"></i>أولياء الأمور
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="w-px h-6 bg-gray-200 mx-1"></div>

                        <!-- 4. Supervision Group -->
                        <div class="relative group" id="grp-Supervision">
                            <button
                                class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm text-gray-600 hover:bg-violet-50 hover:text-violet-700 transition-all">
                                <i class="fas fa-shield-alt text-violet-500"></i>
                                <span>الإشراف</span>
                                <i class="fas fa-chevron-down text-xs opacity-40 mr-1"></i>
                            </button>
                            <div class="absolute top-full right-0 pt-2 w-56 hidden group-hover:block z-50">
                                <div class="bg-white border border-gray-100 rounded-2xl shadow-2xl overflow-hidden p-1">
                                    <button onclick="Admin.switchTab('Monitoring')" data-tab="Monitoring"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-emerald-50 hover:text-emerald-700 rounded-xl transition">
                                        <i class="fas fa-chart-bar w-4 text-emerald-500"></i>لوحة المتابعة
                                    </button>
                                    <button onclick="Admin.switchTab('ClassControl')" data-tab="ClassControl"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-emerald-50 hover:text-emerald-700 rounded-xl transition">
                                        <i class="fas fa-edit w-4 text-emerald-500"></i>تسجيل الحصص
                                    </button>
                                    <button onclick="Admin.switchTab('LogsHistory')" data-tab="LogsHistory"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-blue-50 hover:text-blue-700 rounded-xl transition">
                                        <i class="fas fa-history w-4 text-blue-500"></i>سجل الحصص الشامل
                                    </button>
                                    <button onclick="Admin.switchTab('Reviews')" data-tab="Reviews"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-violet-50 hover:text-violet-700 rounded-xl transition">
                                        <i class="fas fa-check-double w-4 text-violet-500"></i>مراجعة السجلات
                                    </button>
                                    <button onclick="Admin.switchTab('AssessReviews')" data-tab="AssessReviews"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-gray-600 hover:bg-amber-50 hover:text-amber-700 rounded-xl transition">
                                        <i class="fas fa-star w-4 text-amber-500"></i>مراجعة التقييمات
                                    </button>
                                    <div class="border-t border-gray-100 my-1"></div>
                                    <button onclick="Admin.switchTab('Warnings')" data-tab="Warnings"
                                        class="w-full text-right flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-600 hover:bg-red-50 rounded-xl transition">
                                        <i class="fas fa-exclamation-triangle w-4 text-red-500"></i>الإنذارات والمخالفات
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>


                <!-- LATEST NEWS TICKER (Visible to All) -->


                <!-- Dynamic Content Area -->
                <div id="dashboardContent" class="min-h-[300px]"></div>
            </section>
        </main>

        <!-- BOTTOM NAV (Mobile Only) -->
        <nav id="bottomNav"
            class="bg-white border-t border-gray-200 fixed bottom-0 w-full z-40 hidden md:hidden pb-safe">
            <div class="grid grid-cols-3 h-16">
                <button onclick="App.reload()" class="mobile-nav-item active">
                    <i class="fas fa-home text-xl mb-1"></i>
                    <span>الرئيسية</span>
                </button>
                <button onclick="UI.toggleChangePass()" class="mobile-nav-item">
                    <i class="fas fa-key text-xl mb-1"></i>
                    <span>تأمين</span>
                </button>
                <button onclick="Auth.logout()" class="mobile-nav-item text-red-400">
                    <i class="fas fa-sign-out-alt text-xl mb-1"></i>
                    <span>خروج</span>
                </button>
            </div>
        </nav>

    </div>

    <!-- MODALS -->

    <!-- 1. Password Change Modal -->
    <div id="modal-pass"
        class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 scale-95 opacity-0 transition-transform duration-300"
            id="modal-pass-content">
            <div class="text-center mb-4">
                <div class="bg-amber-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-2">
                    <i class="fas fa-lock text-amber-600 text-xl"></i>
                </div>
                <h3 class="font-bold text-lg">تغيير كلمة المرور</h3>
            </div>
            <input type="password" id="newPass" placeholder="كلمة المرور الجديدة"
                class="w-full mb-4 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
            <div class="flex gap-3">
                <button onclick="Auth.changePassword()"
                    class="flex-1 bg-emerald-600 text-white py-2 rounded-xl font-bold">حفظ</button>
                <button onclick="UI.toggleChangePass(false)"
                    class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Modals are now dynamic -->
    <!-- 3. Admin Edit Modal -->
    <div id="modal-admin-edit"
        class="hidden fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/60 backdrop-blur-sm">
        <div
            class="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl p-6 h-[80vh] sm:h-auto flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="font-bold text-lg" id="adminEditTitle">تعديل / إضافة</h3>
                <button onclick="Admin.closeEdit()" class="text-gray-500 hover:text-red-500"><i
                        class="fas fa-times text-xl"></i></button>
            </div>
            <div id="adminEditForm" class="flex-grow overflow-y-auto space-y-3 p-1"></div>
            <div class="mt-4 pt-2 border-t flex justify-end gap-3">
                <button onclick="Admin.saveData()"
                    class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-emerald-700 shadow-md">حفظ</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 mb-20 md:mb-8 text-center text-gray-400 text-xs pb-4">
        <p>تم التصميم والتطوير بواسطة <span class="font-bold text-emerald-600">دريم وير DreamWare</span></p>
    </footer>

    <!-- JAVASCRIPT LOGIC -->
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/teacher.js"></script>
    <script src="js/pages/admin.js"></script>
    <script src="js/pages/parent.js"></script>
    <script src="js/pages/moderator.js"></script>
</body>

</html>
